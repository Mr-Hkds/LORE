    <!-- Auto-recovery for asset loading failures (forces reload on new deployment chunk mismatches) -->
    <script>
      window.addEventListener('error', function(e) {
        var target = e.target || e.srcElement;
        if (target && (target.tagName === 'LINK' || target.tagName === 'SCRIPT')) {
          console.warn('Resource load failed, possible new deployment. Reloading page...', target.src || target.href);
          var lastReload = localStorage.getItem('lore:last_auto_reload');
          var now = Date.now();
          if (!lastReload || (now - parseInt(lastReload, 10) > 15000)) {
            localStorage.setItem('lore:last_auto_reload', now);
            window.location.reload();
          }
        }
      }, true);
    </script>
