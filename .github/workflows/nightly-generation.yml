name: Nightly Archive Content Engine

on:
  schedule:
    # Runs every 30 minutes to generate stories throughout the day
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write
  issues: write

jobs:
  build-and-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Content Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.VITE_GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || secrets.VITE_OPENROUTER_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node generate_stories_ai.cjs

      - name: Commit and Push Archive Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/content/stories.json public/content/concept_index.json public/content/recommendations.json public/content/automation_status.json public/content/images/
          git diff-index --quiet HEAD || (git commit -m "auto: nightly case archive update [skip ci]" && git push origin HEAD:${{ github.ref_name }})
